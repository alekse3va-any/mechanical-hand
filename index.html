<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Механическая рука</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Управляемая механическая рука</h1>
            <p class="subtitle">Веб-интерфейс отправляет команды на Arduino через Flask-сервер.</p>

            <div class="status-grid">
                <div class="status-item">
                    <span>Состояние руки</span>
                    <strong id="handState">—</strong>
                </div>
                <div class="status-item">
                    <span>Объект в руке</span>
                    <strong id="objectState">—</strong>
                </div>
                <div class="status-item">
                    <span>Датчик ладони</span>
                    <strong id="sensorState">—</strong>
                </div>
                <div class="status-item">
                    <span>Подключение</span>
                    <strong id="connectionState">—</strong>
                </div>
            </div>

            <div class="buttons">
                <button id="openButton">Разжать руку</button>
                <button id="closeButton">Сжать руку</button>
                <button id="statusButton" class="secondary">Обновить статус</button>
            </div>

            <p id="message" class="message">Ожидание команды</p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
